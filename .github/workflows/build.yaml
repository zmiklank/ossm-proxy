---
name: Proxy build (Testing Farm)

on:
  workflow_dispatch:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - release-1.28

jobs:
  remove-label:
    runs-on: ubuntu-latest
    if: github.event.action == 'synchronize'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'ok-to-test'
            }).catch(() => {} )
  build:
    runs-on: ubuntu-latest
    # run either because the author is in the VIP list or
    # because someone added the ok-to-test label
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.action != 'labeled' &&
        (
          github.event.pull_request.author_association == 'OWNER' ||
          github.event.pull_request.author_association == 'MEMBER' ||
          github.event.pull_request.author_association == 'COLLABORATOR'
        )
      ) ||
      (
        github.event.action == 'labeled' &&
        github.event.label.name == 'ok-to-test'
      )
    permissions:
      statuses: write # needed for PR commit status updates
      pull-requests: write # needed for PR comments
    steps:
      - name: Install Testing Farm CLI
        run: pip install --quiet tft-cli

      - name: Run build on Testing Farm bare metal
        id: tf
        env:
          TESTING_FARM_API_TOKEN: ${{ secrets.TESTING_FARM_PUBLIC_API_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          GIT_REF: ${{ github.base_ref || github.ref_name }}
          SOURCE_REPO: ${{ github.event.pull_request.head.repo.clone_url || format('{0}/{1}.git', github.server_url, github.repository) }}
          SOURCE_REF: ${{ github.event.pull_request.head.sha || github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_COMMIT_SHA: ${{ github.event.pull_request.head.sha || '' }}
          ARCH: x86_64
        run: bash .github/scripts/run-tf-build.sh

      - name: Collect build artifact
        if: success()
        env:
          ARTIFACTS_URL: ${{ steps.tf.outputs.artifacts_url }}
          SOURCE_REF: ${{ steps.tf.outputs.source_ref }}
        run: |
          ARTIFACT="envoy-alpha-${SOURCE_REF}.tar.gz"
          echo "Fetching results.xml to locate artifact URL..."
          curl -fSL -o results.xml "${ARTIFACTS_URL}/results.xml"
          TF_PATH=$(grep -oP 'href="\K[^"]+'"${ARTIFACT}"'[^"]*' results.xml | head -1)
          [[ -z "${TF_PATH}" ]] && { echo "ERROR: ${ARTIFACT} not found in results.xml"; cat results.xml; exit 1; }
          echo "Downloading: ${TF_PATH}"
          curl -fSL -o "${ARTIFACT}" "${TF_PATH}"
          echo "Downloaded: ${ARTIFACT} ($(du -sh "${ARTIFACT}" | cut -f1))"

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: envoy-alpha-${{ steps.tf.outputs.source_ref }}
          path: envoy-alpha-${{ steps.tf.outputs.source_ref }}.tar.gz
          retention-days: 7

      - name: Fetch Testing Farm logs
        if: failure()
        env:
          REQUEST_ID: ${{ steps.tf.outputs.request_id }}
        run: |
          if [ -z "${REQUEST_ID}" ]; then
            echo "No TF request ID — provisioning never started"
            exit 0
          fi
          ARTIFACTS="https://artifacts.dev.testing-farm.io/${REQUEST_ID}"
          echo "Artifacts URL: ${ARTIFACTS}"
          mkdir -p tf-logs
          python3 -c "
          import urllib.request
          try:
              r = urllib.request.urlopen('${ARTIFACTS}/pipeline.log', timeout=30)
              open('tf-logs/pipeline.log', 'wb').write(r.read())
              print('pipeline.log downloaded')
          except Exception as e:
              print(f'Could not download pipeline.log: {e}')
          "
          echo "=== Last 200 lines of pipeline.log ==="
          tail -200 tf-logs/pipeline.log 2>/dev/null || echo "(no log)"

      - name: Upload Testing Farm logs as artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testing-farm-logs-${{ steps.tf.outputs.request_id }}
          path: tf-logs/
          retention-days: 7

  build-arm64:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.action != 'labeled' &&
        (
          github.event.pull_request.author_association == 'OWNER' ||
          github.event.pull_request.author_association == 'MEMBER' ||
          github.event.pull_request.author_association == 'COLLABORATOR'
        )
      ) ||
      (
        github.event.action == 'labeled' &&
        github.event.label.name == 'ok-to-test'
      )
    permissions:
      statuses: write # needed for PR commit status updates
      pull-requests: write # needed for PR comments
    steps:
      - name: Install Testing Farm CLI
        run: pip install --quiet tft-cli

      - name: Run build on Testing Farm bare metal (arm64)
        id: tf
        env:
          TESTING_FARM_API_TOKEN: ${{ secrets.TESTING_FARM_PUBLIC_API_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          GIT_REF: ${{ github.base_ref || github.ref_name }}
          SOURCE_REPO: ${{ github.event.pull_request.head.repo.clone_url || format('{0}/{1}.git', github.server_url, github.repository) }}
          SOURCE_REF: ${{ github.event.pull_request.head.sha || github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_COMMIT_SHA: ${{ github.event.pull_request.head.sha || '' }}
          ARCH: aarch64
        run: bash .github/scripts/run-tf-build.sh

      - name: Collect build artifact (arm64)
        if: success()
        env:
          ARTIFACTS_URL: ${{ steps.tf.outputs.artifacts_url }}
          SOURCE_REF: ${{ steps.tf.outputs.source_ref }}
        run: |
          ARTIFACT="envoy-alpha-${SOURCE_REF}-arm64.tar.gz"
          echo "Fetching results.xml to locate artifact URL..."
          curl -fSL -o results.xml "${ARTIFACTS_URL}/results.xml"
          TF_PATH=$(grep -oP 'href="\K[^"]+'"${ARTIFACT}"'[^"]*' results.xml | head -1)
          [[ -z "${TF_PATH}" ]] && { echo "ERROR: ${ARTIFACT} not found in results.xml"; cat results.xml; exit 1; }
          echo "Downloading: ${TF_PATH}"
          curl -fSL -o "${ARTIFACT}" "${TF_PATH}"
          echo "Downloaded: ${ARTIFACT} ($(du -sh "${ARTIFACT}" | cut -f1))"

      - name: Upload build artifact (arm64)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: envoy-alpha-${{ steps.tf.outputs.source_ref }}-arm64
          path: envoy-alpha-${{ steps.tf.outputs.source_ref }}-arm64.tar.gz
          retention-days: 7

      - name: Fetch Testing Farm logs
        if: failure()
        env:
          REQUEST_ID: ${{ steps.tf.outputs.request_id }}
        run: |
          if [ -z "${REQUEST_ID}" ]; then
            echo "No TF request ID — provisioning never started"
            exit 0
          fi
          ARTIFACTS="https://artifacts.dev.testing-farm.io/${REQUEST_ID}"
          echo "Artifacts URL: ${ARTIFACTS}"
          mkdir -p tf-logs
          python3 -c "
          import urllib.request
          try:
              r = urllib.request.urlopen('${ARTIFACTS}/pipeline.log', timeout=30)
              open('tf-logs/pipeline.log', 'wb').write(r.read())
              print('pipeline.log downloaded')
          except Exception as e:
              print(f'Could not download pipeline.log: {e}')
          "
          echo "=== Last 200 lines of pipeline.log ==="
          tail -200 tf-logs/pipeline.log 2>/dev/null || echo "(no log)"

      - name: Upload Testing Farm logs as artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testing-farm-logs-arm64-${{ steps.tf.outputs.request_id }}
          path: tf-logs/
          retention-days: 7
