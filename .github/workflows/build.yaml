---
name: Proxy build (Testing Farm)

on:
  workflow_dispatch:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - release-1.28

jobs:
  remove-label:
    runs-on: ubuntu-latest
    if: github.event.action == 'synchronize'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'ok-to-test'
            }).catch(() => {} )
  build:
    runs-on: ubuntu-latest
    # run either because the author is in the VIP list or
    # because someone added the ok-to-test label
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.action != 'labeled' &&
        (
          github.event.pull_request.author_association == 'OWNER' ||
          github.event.pull_request.author_association == 'MEMBER' ||
          github.event.pull_request.author_association == 'COLLABORATOR'
        )
      ) ||
      (
        github.event.action == 'labeled' &&
        github.event.label.name == 'ok-to-test'
      )
    permissions:
      statuses: write # needed for PR commit status updates
      pull-requests: write # needed for PR comments
    steps:
      - name: Install Testing Farm CLI
        run: pip install --quiet tft-cli

      - name: Run build on Testing Farm bare metal
        id: tf
        env:
          TESTING_FARM_API_TOKEN: ${{ secrets.TESTING_FARM_API_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          GIT_REF: ${{ github.base_ref || github.ref_name }}
          SOURCE_REPO: ${{ github.event.pull_request.head.repo.clone_url || format('{0}/{1}.git', github.server_url, github.repository) }}
          SOURCE_REF: ${{ github.event.pull_request.head.sha || github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_COMMIT_SHA: ${{ github.event.pull_request.head.sha || '' }}
          STATUS_NAME: "Testing Farm bare metal"
          ARCH: x86_64
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          API_URL="https://api.testing-farm.io/v0.1"
          POOL="aws-10-bare-metal"
          TIMEOUT_MIN=120

          # Cancel TF request on unexpected job exit (GHA cancel button sends SIGTERM)
          REQ_ID=""
          tf_cancel() {
            [[ -n "${REQ_ID}" ]] && \
              TESTING_FARM_API_URL="${API_URL}" testing-farm cancel "${REQ_ID}" 2>/dev/null || true
          }
          trap tf_cancel EXIT

          # Update PR commit status helper
          set_pr_status() {
            local state="$1" description="$2"
            [[ -z "${PR_COMMIT_SHA}" ]] && return 0
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${PR_COMMIT_SHA}" \
              -f state="${state}" \
              -f context="${STATUS_NAME}" \
              -f description="${description}" \
              -f target_url="${ARTIFACTS_URL:-}" || true
          }

          ARTIFACTS_URL=""
          set_pr_status "pending" "Build running on Testing Farm bare metal..."

          # Submit request
          echo "Submitting TF request (pool: ${POOL}, arch: ${ARCH})..."
          REQ_OUTPUT=$(TESTING_FARM_API_URL="${API_URL}" testing-farm request \
            --compose "RHEL-9-Nightly" \
            --arch "${ARCH}" \
            --pool "${POOL}" \
            --hardware "virtualization.is-virtualized=false" \
            --git-url "https://github.com/openshift-service-mesh/proxy.git" \
            --git-ref "${GIT_REF}" \
            --plan "/plans/build" \
            --environment "SOURCE_REPO=${SOURCE_REPO}" \
            --environment "SOURCE_REF=${SOURCE_REF}" \
            --timeout "${TIMEOUT_MIN}" \
            --no-wait 2>&1)
          echo "${REQ_OUTPUT}"

          REQ_ID=$(echo "${REQ_OUTPUT}" | grep -oP 'requests/\K[a-f0-9-]+' | head -1 || true)
          [[ -z "${REQ_ID}" ]] && { echo "ERROR: Could not extract request ID"; exit 1; }

          ARTIFACTS_URL="https://artifacts.osci.redhat.com/testing-farm/${REQ_ID}"
          echo "request_id=${REQ_ID}"          >> "${GITHUB_OUTPUT}"
          echo "artifacts_url=${ARTIFACTS_URL}" >> "${GITHUB_OUTPUT}"
          echo "Request ID: ${REQ_ID}"
          echo "Artifacts:  ${ARTIFACTS_URL}"

          # Poll for completion
          DEADLINE=$(( $(date +%s) + TIMEOUT_MIN * 60 ))
          POLL=0
          while true; do
            POLL=$(( POLL + 1 ))
            ELAPSED=$(( $(date +%s) - (DEADLINE - TIMEOUT_MIN * 60) ))
            echo "Poll #${POLL} elapsed=${ELAPSED}s ..."

            set +e
            OUT=$(TESTING_FARM_API_URL="${API_URL}" testing-farm list \
                  --id "${REQ_ID}" --format json 2>&1)
            LIST_RC=$?
            set -e
            if [[ ${LIST_RC} -ne 0 ]]; then
              echo "Warning: testing-farm list failed, retrying..."; sleep 30; continue
            fi

            STATE=$(echo "${OUT}" | jq -r '.[0].state // empty')
            RESULT=$(echo "${OUT}" | jq -r '.[0].result.overall // empty')
            echo "  state=${STATE:-?} result=${RESULT:-?}"

            if [[ "${STATE}" =~ ^(complete|error|canceled)$ ]]; then
              API_ARTS=$(echo "${OUT}" | jq -r '.[0].run.artifacts // empty')
              [[ -n "${API_ARTS}" && "${API_ARTS}" != "null" ]] && ARTIFACTS_URL="${API_ARTS}"
              echo "artifacts_url=${ARTIFACTS_URL}" >> "${GITHUB_OUTPUT}"

              # GitHub Step Summary
              {
                echo "## ${STATUS_NAME}"
                echo "| Field | Value |"
                echo "|-------|-------|"
                echo "| Request ID | \`${REQ_ID}\` |"
                echo "| State | ${STATE} |"
                echo "| Result | ${RESULT:-n/a} |"
                echo "| Artifacts | [View](${ARTIFACTS_URL}) |"
              } >> "${GITHUB_STEP_SUMMARY}"

              # PR comment
              if [[ -n "${PR_NUMBER}" ]]; then
                gh pr comment "${PR_NUMBER}" \
                  --repo "${GITHUB_REPOSITORY}" \
                  --body "**${STATUS_NAME}** (\`${REQ_ID}\`) — state: **${STATE}**, result: **${RESULT:-n/a}** — [Artifacts](${ARTIFACTS_URL})" \
                  || true
              fi

              # PR commit status
              case "${STATE}:${RESULT}" in
                complete:passed) set_pr_status "success" "Build passed" ;;
                complete:*)      set_pr_status "failure" "Build failed: ${RESULT:-unknown}" ;;
                *)               set_pr_status "error"   "TF ${STATE}" ;;
              esac

              # Clear EXIT trap — request is in terminal state, nothing to cancel
              trap - EXIT; REQ_ID=""

              [[ "${STATE}" == "complete" && "${RESULT}" == "passed" ]] && exit 0 || exit 1
            fi

            if (( $(date +%s) > DEADLINE )); then
              echo "TIMEOUT after ${TIMEOUT_MIN} minutes"
              set_pr_status "error" "Timeout after ${TIMEOUT_MIN} min"
              exit 1
            fi

            sleep 30
          done

      - name: Collect release artifact from TF
        id: artifact
        if: success()
        env:
          ARTIFACTS_URL: ${{ steps.tf.outputs.artifacts_url }}
        run: |
          set -eo pipefail

          echo "Fetching pipeline.log from ${ARTIFACTS_URL} ..."
          PIPELINE_LOG=$(curl -s "${ARTIFACTS_URL}/pipeline.log" || true)
          if [[ -z "${PIPELINE_LOG}" ]]; then
            echo "ERROR: could not fetch pipeline.log from ${ARTIFACTS_URL}"
            exit 1
          fi

          # Extract the TMT work directory name (e.g. work-buildXXXXX)
          WORK_DIR=$(echo "${PIPELINE_LOG}" | grep -o "work-build[^']*" | head -1 || true)
          if [[ -z "${WORK_DIR}" ]]; then
            echo "ERROR: work directory not found in pipeline.log"
            echo "--- pipeline.log (first 20 lines) ---"
            echo "${PIPELINE_LOG}" | head -20
            exit 1
          fi
          echo "Work directory: ${WORK_DIR}"

          DATA_URL="${ARTIFACTS_URL}/${WORK_DIR}/plans/build/execute/data/guest/default-0/plans/build-1/data"
          echo "Fetching artifact.env from ${DATA_URL} ..."
          ARTIFACT_NAME=$(curl -s "${DATA_URL}/artifact.env" | grep "^ARTIFACT_NAME=" | cut -d= -f2 || true)
          if [[ -z "${ARTIFACT_NAME}" ]]; then
            echo "ERROR: artifact.env not found or empty at ${DATA_URL}"
            exit 1
          fi
          echo "Artifact name: ${ARTIFACT_NAME}"

          echo "Downloading ${ARTIFACT_NAME} ..."
          curl -fL --retry 3 -o "${ARTIFACT_NAME}" "${DATA_URL}/${ARTIFACT_NAME}"
          ls -lh "${ARTIFACT_NAME}"
          echo "name=${ARTIFACT_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Upload release artifact (pre-submit cache)
        if: success() && steps.artifact.outputs.name != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.name }}
          retention-days: 7
          if-no-files-found: error

      - name: Fetch Testing Farm logs
        if: failure()
        env:
          REQUEST_ID: ${{ steps.tf.outputs.request_id }}
        run: |
          if [ -z "${REQUEST_ID}" ]; then
            echo "No TF request ID — provisioning never started"
            exit 0
          fi
          ARTIFACTS="https://artifacts.osci.redhat.com/testing-farm/${REQUEST_ID}"
          echo "Artifacts URL: ${ARTIFACTS}"
          mkdir -p tf-logs
          python3 -c "
          import urllib.request
          try:
              r = urllib.request.urlopen('${ARTIFACTS}/pipeline.log', timeout=30)
              open('tf-logs/pipeline.log', 'wb').write(r.read())
              print('pipeline.log downloaded')
          except Exception as e:
              print(f'Could not download pipeline.log: {e}')
          "
          echo "=== Last 200 lines of pipeline.log ==="
          tail -200 tf-logs/pipeline.log 2>/dev/null || echo "(no log)"

      - name: Upload Testing Farm logs as artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testing-farm-logs-${{ steps.tf.outputs.request_id }}
          path: tf-logs/
          retention-days: 7

  build-arm64:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.action != 'labeled' &&
        (
          github.event.pull_request.author_association == 'OWNER' ||
          github.event.pull_request.author_association == 'MEMBER' ||
          github.event.pull_request.author_association == 'COLLABORATOR'
        )
      ) ||
      (
        github.event.action == 'labeled' &&
        github.event.label.name == 'ok-to-test'
      )
    permissions:
      statuses: write # needed for PR commit status updates
      pull-requests: write # needed for PR comments
    steps:
      - name: Install Testing Farm CLI
        run: pip install --quiet tft-cli

      - name: Run build on Testing Farm bare metal (arm64)
        id: tf
        env:
          TESTING_FARM_API_TOKEN: ${{ secrets.TESTING_FARM_API_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          GIT_REF: ${{ github.base_ref || github.ref_name }}
          SOURCE_REPO: ${{ github.event.pull_request.head.repo.clone_url || format('{0}/{1}.git', github.server_url, github.repository) }}
          SOURCE_REF: ${{ github.event.pull_request.head.sha || github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_COMMIT_SHA: ${{ github.event.pull_request.head.sha || '' }}
          STATUS_NAME: "Testing Farm bare metal arm64"
          ARCH: aarch64
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          API_URL="https://api.testing-farm.io/v0.1"
          POOL="aws-10-bare-metal"
          TIMEOUT_MIN=120

          # Cancel TF request on unexpected job exit (GHA cancel button sends SIGTERM)
          REQ_ID=""
          tf_cancel() {
            [[ -n "${REQ_ID}" ]] && \
              TESTING_FARM_API_URL="${API_URL}" testing-farm cancel "${REQ_ID}" 2>/dev/null || true
          }
          trap tf_cancel EXIT

          # Update PR commit status helper
          set_pr_status() {
            local state="$1" description="$2"
            [[ -z "${PR_COMMIT_SHA}" ]] && return 0
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${PR_COMMIT_SHA}" \
              -f state="${state}" \
              -f context="${STATUS_NAME}" \
              -f description="${description}" \
              -f target_url="${ARTIFACTS_URL:-}" || true
          }

          ARTIFACTS_URL=""
          set_pr_status "pending" "Build running on Testing Farm bare metal..."

          # Submit request
          echo "Submitting TF request (pool: ${POOL}, arch: ${ARCH})..."
          REQ_OUTPUT=$(TESTING_FARM_API_URL="${API_URL}" testing-farm request \
            --compose "RHEL-9-Nightly" \
            --arch "${ARCH}" \
            --pool "${POOL}" \
            --hardware "virtualization.is-virtualized=false" \
            --git-url "https://github.com/openshift-service-mesh/proxy.git" \
            --git-ref "${GIT_REF}" \
            --plan "/plans/build" \
            --environment "SOURCE_REPO=${SOURCE_REPO}" \
            --environment "SOURCE_REF=${SOURCE_REF}" \
            --timeout "${TIMEOUT_MIN}" \
            --no-wait 2>&1)
          echo "${REQ_OUTPUT}"

          REQ_ID=$(echo "${REQ_OUTPUT}" | grep -oP 'requests/\K[a-f0-9-]+' | head -1 || true)
          [[ -z "${REQ_ID}" ]] && { echo "ERROR: Could not extract request ID"; exit 1; }

          ARTIFACTS_URL="https://artifacts.osci.redhat.com/testing-farm/${REQ_ID}"
          echo "request_id=${REQ_ID}"          >> "${GITHUB_OUTPUT}"
          echo "artifacts_url=${ARTIFACTS_URL}" >> "${GITHUB_OUTPUT}"
          echo "Request ID: ${REQ_ID}"
          echo "Artifacts:  ${ARTIFACTS_URL}"

          # Poll for completion
          DEADLINE=$(( $(date +%s) + TIMEOUT_MIN * 60 ))
          POLL=0
          while true; do
            POLL=$(( POLL + 1 ))
            ELAPSED=$(( $(date +%s) - (DEADLINE - TIMEOUT_MIN * 60) ))
            echo "Poll #${POLL} elapsed=${ELAPSED}s ..."

            set +e
            OUT=$(TESTING_FARM_API_URL="${API_URL}" testing-farm list \
                  --id "${REQ_ID}" --format json 2>&1)
            LIST_RC=$?
            set -e
            if [[ ${LIST_RC} -ne 0 ]]; then
              echo "Warning: testing-farm list failed, retrying..."; sleep 30; continue
            fi

            STATE=$(echo "${OUT}" | jq -r '.[0].state // empty')
            RESULT=$(echo "${OUT}" | jq -r '.[0].result.overall // empty')
            echo "  state=${STATE:-?} result=${RESULT:-?}"

            if [[ "${STATE}" =~ ^(complete|error|canceled)$ ]]; then
              API_ARTS=$(echo "${OUT}" | jq -r '.[0].run.artifacts // empty')
              [[ -n "${API_ARTS}" && "${API_ARTS}" != "null" ]] && ARTIFACTS_URL="${API_ARTS}"
              echo "artifacts_url=${ARTIFACTS_URL}" >> "${GITHUB_OUTPUT}"

              # GitHub Step Summary
              {
                echo "## ${STATUS_NAME}"
                echo "| Field | Value |"
                echo "|-------|-------|"
                echo "| Request ID | \`${REQ_ID}\` |"
                echo "| State | ${STATE} |"
                echo "| Result | ${RESULT:-n/a} |"
                echo "| Artifacts | [View](${ARTIFACTS_URL}) |"
              } >> "${GITHUB_STEP_SUMMARY}"

              # PR comment
              if [[ -n "${PR_NUMBER}" ]]; then
                gh pr comment "${PR_NUMBER}" \
                  --repo "${GITHUB_REPOSITORY}" \
                  --body "**${STATUS_NAME}** (\`${REQ_ID}\`) — state: **${STATE}**, result: **${RESULT:-n/a}** — [Artifacts](${ARTIFACTS_URL})" \
                  || true
              fi

              # PR commit status
              case "${STATE}:${RESULT}" in
                complete:passed) set_pr_status "success" "Build passed" ;;
                complete:*)      set_pr_status "failure" "Build failed: ${RESULT:-unknown}" ;;
                *)               set_pr_status "error"   "TF ${STATE}" ;;
              esac

              # Clear EXIT trap — request is in terminal state, nothing to cancel
              trap - EXIT; REQ_ID=""

              [[ "${STATE}" == "complete" && "${RESULT}" == "passed" ]] && exit 0 || exit 1
            fi

            if (( $(date +%s) > DEADLINE )); then
              echo "TIMEOUT after ${TIMEOUT_MIN} minutes"
              set_pr_status "error" "Timeout after ${TIMEOUT_MIN} min"
              exit 1
            fi

            sleep 30
          done

      - name: Collect release artifact from TF
        id: artifact
        if: success()
        env:
          ARTIFACTS_URL: ${{ steps.tf.outputs.artifacts_url }}
        run: |
          set -euo pipefail
          WORK_DIR=$(curl -sf "${ARTIFACTS_URL}/pipeline.log" \
            | grep -oP "working directory '\Kwork-build[^']+" | head -1)
          [[ -z "${WORK_DIR}" ]] && { echo "ERROR: work directory not found in pipeline.log"; exit 1; }

          DATA_URL="${ARTIFACTS_URL}/${WORK_DIR}/plans/build/execute/data/guest/default-0/plans/build-1/data"
          ARTIFACT_NAME=$(curl -sf "${DATA_URL}/artifact.env" | grep "^ARTIFACT_NAME=" | cut -d= -f2)
          [[ -z "${ARTIFACT_NAME}" ]] && { echo "ERROR: artifact.env not found at ${DATA_URL}"; exit 1; }

          echo "Downloading ${ARTIFACT_NAME} from TF artifacts..."
          curl -fL --retry 3 -o "${ARTIFACT_NAME}" "${DATA_URL}/${ARTIFACT_NAME}"
          ls -lh "${ARTIFACT_NAME}"
          echo "name=${ARTIFACT_NAME}" >> "${GITHUB_OUTPUT}"

