---
name: Proxy build (Testing Farm)

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - release-1.28

jobs:
  remove-label:
    runs-on: ubuntu-latest
    if: github.event.action == 'synchronize'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'ok-to-test'
            }).catch(() => {} )
  build:
    runs-on: ubuntu-latest
    # run either because the author is in the VIP list or
    # because someone added the ok-to-test label
    if: |
      (
        github.event.action != 'labeled' &&
        (
          github.event.pull_request.author_association == 'OWNER' ||
          github.event.pull_request.author_association == 'MEMBER' ||
          github.event.pull_request.author_association == 'COLLABORATOR'
        )
      ) ||
      (
        github.event.action == 'labeled' &&
        github.event.label.name == 'ok-to-test'
      )
    permissions:
      statuses: write # needed for update_pull_request_status
      pull-requests: write # needed for create_issue_comment
    steps:
      - name: Run build on Testing Farm bare metal
        id: tf
        uses: sclorg/testing-farm-as-github-action@v4
        with:
          api_key: ${{ secrets.TESTING_FARM_API_TOKEN }}
          api_url: https://api.testing-farm.io/v0.1
          compose: RHEL-9-Nightly
          # using base repo and base_ref we ensure tmt plan executed cannot be modified by PR
          git_url: https://github.com/openshift-service-mesh/proxy.git
          git_ref: ${{ github.base_ref }}
          tmt_plan_regex: /plans/build
          tmt_hardware: '{"virtualization": {"is-virtualized": false}}'
          tmt_context: "arch=x86_64"
          variables: "SOURCE_REPO=${{ github.event.pull_request.head.repo.clone_url }};SOURCE_REF=${{ github.event.pull_request.head.sha }}"
          timeout: 120
          update_pull_request_status: true
          pull_request_status_name: "Testing Farm bare metal"
          create_issue_comment: true

      - name: Fetch Testing Farm logs
        if: failure()
        env:
          REQUEST_ID: ${{ steps.tf.outputs.request_id }}
        run: |
          if [ -z "${REQUEST_ID}" ]; then
            echo "No TF request ID — provisioning never started"
            exit 0
          fi
          ARTIFACTS="https://artifacts.dev.testing-farm.io/${REQUEST_ID}"
          echo "Artifacts URL: ${ARTIFACTS}"
          mkdir -p tf-logs
          python3 -c "
          import urllib.request
          try:
              r = urllib.request.urlopen('${ARTIFACTS}/pipeline.log', timeout=30)
              open('tf-logs/pipeline.log', 'wb').write(r.read())
              print('pipeline.log downloaded')
          except Exception as e:
              print(f'Could not download pipeline.log: {e}')
          "
          echo "=== Last 200 lines of pipeline.log ==="
          tail -200 tf-logs/pipeline.log 2>/dev/null || echo "(no log)"

      - name: Upload Testing Farm logs as artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testing-farm-logs-${{ steps.tf.outputs.request_id }}
          path: tf-logs/
          retention-days: 7

  build-arm64:
    runs-on: ubuntu-latest
    if: |
      (
        github.event.action != 'labeled' &&
        (
          github.event.pull_request.author_association == 'OWNER' ||
          github.event.pull_request.author_association == 'MEMBER' ||
          github.event.pull_request.author_association == 'COLLABORATOR'
        )
      ) ||
      (
        github.event.action == 'labeled' &&
        github.event.label.name == 'ok-to-test'
      )
    permissions:
      statuses: write # needed for update_pull_request_status
      pull-requests: write # needed for create_issue_comment
    steps:
      - name: Run build on Testing Farm bare metal (arm64)
        id: tf
        uses: sclorg/testing-farm-as-github-action@v4
        with:
          api_key: ${{ secrets.TESTING_FARM_API_TOKEN }}
          api_url: https://api.testing-farm.io/v0.1
          compose: RHEL-9-Nightly
          arch: aarch64
          # using base repo and base_ref we ensure tmt plan executed cannot be modified by PR
          git_url: https://github.com/openshift-service-mesh/proxy.git
          git_ref: ${{ github.base_ref }}
          tmt_plan_regex: /plans/build
          tmt_hardware: '{"virtualization": {"is-virtualized": false}}'
          tmt_context: "arch=aarch64"
          variables: "SOURCE_REPO=${{ github.event.pull_request.head.repo.clone_url }};SOURCE_REF=${{ github.event.pull_request.head.sha }}"
          timeout: 120
          update_pull_request_status: true
          pull_request_status_name: "Testing Farm bare metal arm64"
          create_issue_comment: true

      - name: Fetch Testing Farm logs
        if: failure()
        env:
          REQUEST_ID: ${{ steps.tf.outputs.request_id }}
        run: |
          if [ -z "${REQUEST_ID}" ]; then
            echo "No TF request ID — provisioning never started"
            exit 0
          fi
          ARTIFACTS="https://artifacts.dev.testing-farm.io/${REQUEST_ID}"
          echo "Artifacts URL: ${ARTIFACTS}"
          mkdir -p tf-logs
          python3 -c "
          import urllib.request
          try:
              r = urllib.request.urlopen('${ARTIFACTS}/pipeline.log', timeout=30)
              open('tf-logs/pipeline.log', 'wb').write(r.read())
              print('pipeline.log downloaded')
          except Exception as e:
              print(f'Could not download pipeline.log: {e}')
          "
          echo "=== Last 200 lines of pipeline.log ==="
          tail -200 tf-logs/pipeline.log 2>/dev/null || echo "(no log)"

      - name: Upload Testing Farm logs as artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testing-farm-logs-arm64-${{ steps.tf.outputs.request_id }}
          path: tf-logs/
          retention-days: 7
