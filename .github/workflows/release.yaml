---
name: Release artifact (post-merge)

# Equivalent to Prow's postsubmit jobs: copy-artifacts-gcs and copy-artifacts-gcs-arm.
# Triggered when a PR is merged to release-1.28.
# Produces envoy-alpha-{SHA}.tar.gz and envoy-alpha-{SHA}-arm64.tar.gz in GCS.
#
# The TF bare metal machine (which has internet access) uploads the artifact
# directly to GCS. The GCS service account key is passed as a TF secret.
# GitHub Actions runners cannot access artifacts.osci.redhat.com (private RH
# network) so the upload must happen from within the TF environment.

on:
  push:
    branches:
      - release-1.28
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, skip the GCS upload (for testing without credentials)'
        required: false
        type: boolean
        default: true

jobs:
  release-x86:
    runs-on: ubuntu-latest
    steps:
      - name: Install Testing Farm CLI
        run: pip install --quiet tft-cli

      - name: Build and publish release artifact (x86_64)
        id: tf
        env:
          TESTING_FARM_API_TOKEN: ${{ secrets.TESTING_FARM_API_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          GIT_REF: ${{ github.ref_name }}
          SOURCE_REPO: ${{ format('{0}/{1}.git', github.server_url, github.repository) }}
          SOURCE_REF: ${{ github.sha }}
          ARCH: x86_64
          # GCS key is base64-encoded to safely pass as a TF environment variable.
          # The TF machine decodes it and uses it to upload directly to GCS.
          GCS_SERVICE_ACCOUNT_KEY: ${{ secrets.GCS_SERVICE_ACCOUNT_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          API_URL="https://api.testing-farm.io/v0.1"
          POOL="aws-10-bare-metal"
          TIMEOUT_MIN=120

          REQ_ID=""
          tf_cancel() {
            [[ -n "${REQ_ID}" ]] && \
              TESTING_FARM_API_URL="${API_URL}" testing-farm cancel "${REQ_ID}" 2>/dev/null || true
          }
          trap tf_cancel EXIT

          # Determine whether to pass the GCS key to TF
          # Base64-encode the GCS key so it can be passed safely as a TF env var
          # (the JSON content contains newlines and special characters)
          GCS_ENV_FLAG=""
          if [[ "${DRY_RUN}" != "true" && -n "${GCS_SERVICE_ACCOUNT_KEY:-}" ]]; then
            GCS_KEY_B64=$(echo "${GCS_SERVICE_ACCOUNT_KEY}" | base64 -w0)
            GCS_ENV_FLAG="--environment GCS_KEY_JSON_B64=${GCS_KEY_B64}"
          else
            echo "Note: GCS upload will be skipped (dry_run=${DRY_RUN}, key_set=$([[ -n "${GCS_SERVICE_ACCOUNT_KEY:-}" ]] && echo yes || echo no))"
          fi

          echo "Submitting TF release request (arch: ${ARCH})..."
          REQ_OUTPUT=$(TESTING_FARM_API_URL="${API_URL}" testing-farm request \
            --compose "RHEL-9-Nightly" \
            --arch "${ARCH}" \
            --pool "${POOL}" \
            --hardware "virtualization.is-virtualized=false" \
            --git-url "https://github.com/openshift-service-mesh/proxy.git" \
            --git-ref "${GIT_REF}" \
            --plan "/plans/release" \
            --environment "SOURCE_REPO=${SOURCE_REPO}" \
            --environment "SOURCE_REF=${SOURCE_REF}" \
            ${GCS_ENV_FLAG} \
            --timeout "${TIMEOUT_MIN}" \
            --no-wait 2>&1)
          echo "${REQ_OUTPUT}"

          REQ_ID=$(echo "${REQ_OUTPUT}" | grep -oP 'requests/\K[a-f0-9-]+' | head -1 || true)
          [[ -z "${REQ_ID}" ]] && { echo "ERROR: Could not extract request ID"; exit 1; }

          ARTIFACTS_URL="https://artifacts.osci.redhat.com/testing-farm/${REQ_ID}"
          echo "request_id=${REQ_ID}"          >> "${GITHUB_OUTPUT}"
          echo "artifacts_url=${ARTIFACTS_URL}" >> "${GITHUB_OUTPUT}"
          echo "Request ID: ${REQ_ID}"
          echo "Artifacts:  ${ARTIFACTS_URL}"

          DEADLINE=$(( $(date +%s) + TIMEOUT_MIN * 60 ))
          POLL=0
          while true; do
            POLL=$(( POLL + 1 ))
            ELAPSED=$(( $(date +%s) - (DEADLINE - TIMEOUT_MIN * 60) ))
            echo "Poll #${POLL} elapsed=${ELAPSED}s ..."

            set +e
            OUT=$(TESTING_FARM_API_URL="${API_URL}" testing-farm list \
                  --id "${REQ_ID}" --format json 2>&1)
            LIST_RC=$?
            set -e
            if [[ ${LIST_RC} -ne 0 ]]; then
              echo "Warning: testing-farm list failed, retrying..."; sleep 30; continue
            fi

            STATE=$(echo "${OUT}" | jq -r '.[0].state // empty')
            RESULT=$(echo "${OUT}" | jq -r '.[0].result.overall // empty')
            echo "  state=${STATE:-?} result=${RESULT:-?}"

            if [[ "${STATE}" =~ ^(complete|error|canceled)$ ]]; then
              API_ARTS=$(echo "${OUT}" | jq -r '.[0].run.artifacts // empty')
              [[ -n "${API_ARTS}" && "${API_ARTS}" != "null" ]] && ARTIFACTS_URL="${API_ARTS}"
              echo "artifacts_url=${ARTIFACTS_URL}" >> "${GITHUB_OUTPUT}"

              {
                echo "## Release artifact x86_64"
                echo "| Field | Value |"
                echo "|-------|-------|"
                echo "| Request ID | \`${REQ_ID}\` |"
                echo "| State | ${STATE} |"
                echo "| Result | ${RESULT:-n/a} |"
                if [[ "${DRY_RUN}" != "true" && "${STATE}" == "complete" && "${RESULT}" == "passed" ]]; then
                  GCS_URL="https://storage.googleapis.com/maistra-prow-testing/proxy/envoy-alpha-${SOURCE_REF}.tar.gz"
                  echo "| GCS artifact | [Download](${GCS_URL}) |"
                fi
              } >> "${GITHUB_STEP_SUMMARY}"

              trap - EXIT; REQ_ID=""
              [[ "${STATE}" == "complete" && "${RESULT}" == "passed" ]] && exit 0 || exit 1
            fi

            if (( $(date +%s) > DEADLINE )); then
              echo "TIMEOUT after ${TIMEOUT_MIN} minutes"; exit 1
            fi
            sleep 30
          done

  release-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Install Testing Farm CLI
        run: pip install --quiet tft-cli

      - name: Build and publish release artifact (arm64)
        id: tf
        env:
          TESTING_FARM_API_TOKEN: ${{ secrets.TESTING_FARM_API_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          GIT_REF: ${{ github.ref_name }}
          SOURCE_REPO: ${{ format('{0}/{1}.git', github.server_url, github.repository) }}
          SOURCE_REF: ${{ github.sha }}
          ARCH: aarch64
          GCS_SERVICE_ACCOUNT_KEY: ${{ secrets.GCS_SERVICE_ACCOUNT_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          API_URL="https://api.testing-farm.io/v0.1"
          POOL="aws-10-bare-metal"
          TIMEOUT_MIN=120

          REQ_ID=""
          tf_cancel() {
            [[ -n "${REQ_ID}" ]] && \
              TESTING_FARM_API_URL="${API_URL}" testing-farm cancel "${REQ_ID}" 2>/dev/null || true
          }
          trap tf_cancel EXIT

          # Base64-encode the GCS key so it can be passed safely as a TF env var
          # (the JSON content contains newlines and special characters)
          GCS_ENV_FLAG=""
          if [[ "${DRY_RUN}" != "true" && -n "${GCS_SERVICE_ACCOUNT_KEY:-}" ]]; then
            GCS_KEY_B64=$(echo "${GCS_SERVICE_ACCOUNT_KEY}" | base64 -w0)
            GCS_ENV_FLAG="--environment GCS_KEY_JSON_B64=${GCS_KEY_B64}"
          else
            echo "Note: GCS upload will be skipped (dry_run=${DRY_RUN}, key_set=$([[ -n "${GCS_SERVICE_ACCOUNT_KEY:-}" ]] && echo yes || echo no))"
          fi

          echo "Submitting TF release request (arch: ${ARCH})..."
          REQ_OUTPUT=$(TESTING_FARM_API_URL="${API_URL}" testing-farm request \
            --compose "RHEL-9-Nightly" \
            --arch "${ARCH}" \
            --pool "${POOL}" \
            --hardware "virtualization.is-virtualized=false" \
            --git-url "https://github.com/openshift-service-mesh/proxy.git" \
            --git-ref "${GIT_REF}" \
            --plan "/plans/release" \
            --environment "SOURCE_REPO=${SOURCE_REPO}" \
            --environment "SOURCE_REF=${SOURCE_REF}" \
            ${GCS_ENV_FLAG} \
            --timeout "${TIMEOUT_MIN}" \
            --no-wait 2>&1)
          echo "${REQ_OUTPUT}"

          REQ_ID=$(echo "${REQ_OUTPUT}" | grep -oP 'requests/\K[a-f0-9-]+' | head -1 || true)
          [[ -z "${REQ_ID}" ]] && { echo "ERROR: Could not extract request ID"; exit 1; }

          ARTIFACTS_URL="https://artifacts.osci.redhat.com/testing-farm/${REQ_ID}"
          echo "request_id=${REQ_ID}"          >> "${GITHUB_OUTPUT}"
          echo "artifacts_url=${ARTIFACTS_URL}" >> "${GITHUB_OUTPUT}"
          echo "Request ID: ${REQ_ID}"
          echo "Artifacts:  ${ARTIFACTS_URL}"

          DEADLINE=$(( $(date +%s) + TIMEOUT_MIN * 60 ))
          POLL=0
          while true; do
            POLL=$(( POLL + 1 ))
            ELAPSED=$(( $(date +%s) - (DEADLINE - TIMEOUT_MIN * 60) ))
            echo "Poll #${POLL} elapsed=${ELAPSED}s ..."

            set +e
            OUT=$(TESTING_FARM_API_URL="${API_URL}" testing-farm list \
                  --id "${REQ_ID}" --format json 2>&1)
            LIST_RC=$?
            set -e
            if [[ ${LIST_RC} -ne 0 ]]; then
              echo "Warning: testing-farm list failed, retrying..."; sleep 30; continue
            fi

            STATE=$(echo "${OUT}" | jq -r '.[0].state // empty')
            RESULT=$(echo "${OUT}" | jq -r '.[0].result.overall // empty')
            echo "  state=${STATE:-?} result=${RESULT:-?}"

            if [[ "${STATE}" =~ ^(complete|error|canceled)$ ]]; then
              API_ARTS=$(echo "${OUT}" | jq -r '.[0].run.artifacts // empty')
              [[ -n "${API_ARTS}" && "${API_ARTS}" != "null" ]] && ARTIFACTS_URL="${API_ARTS}"
              echo "artifacts_url=${ARTIFACTS_URL}" >> "${GITHUB_OUTPUT}"

              {
                echo "## Release artifact arm64"
                echo "| Field | Value |"
                echo "|-------|-------|"
                echo "| Request ID | \`${REQ_ID}\` |"
                echo "| State | ${STATE} |"
                echo "| Result | ${RESULT:-n/a} |"
                if [[ "${DRY_RUN}" != "true" && "${STATE}" == "complete" && "${RESULT}" == "passed" ]]; then
                  GCS_URL="https://storage.googleapis.com/maistra-prow-testing/proxy/envoy-alpha-${SOURCE_REF}-arm64.tar.gz"
                  echo "| GCS artifact | [Download](${GCS_URL}) |"
                fi
              } >> "${GITHUB_STEP_SUMMARY}"

              trap - EXIT; REQ_ID=""
              [[ "${STATE}" == "complete" && "${RESULT}" == "passed" ]] && exit 0 || exit 1
